name: mindmate
description: "MindMate - your companion for emotional wellbeing, relaxation, and mindful entertainment."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # State management
  flutter_riverpod: ^2.5.1

  # Firebase
  firebase_core: ^3.1.0
  firebase_auth: ^5.1.0
  cloud_firestore: ^5.0.1
  firebase_storage: ^12.1.0
  firebase_messaging: ^15.0.0

  # Local storage / offline cache
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.3

  # UI / charts
  fl_chart: ^0.68.0
  google_fonts: ^6.2.1
  lottie: ^3.1.2
  shimmer: ^3.0.0

  # Audio for relaxation sounds
  just_audio: ^0.9.40

  # Notifications (daily check-in reminders)
  flutter_local_notifications: ^17.1.2

  # Utilities
  intl: ^0.19.0
  uuid: ^4.4.0
  url_launcher: ^6.3.0
  go_router: ^14.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.11

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/
    - assets/animations/
    - assets/images/
